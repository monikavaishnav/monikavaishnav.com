var currentPkg = 'regular';
var product = null;

function render(pkg) {
  currentPkg = pkg;
  var p = product;
  var pkgData = p[pkg];

  // Image
  var img = document.getElementById('pdp-img');
  img.style.opacity = '0';
  setTimeout(function() {
    img.src = pkgData.img;
    img.alt = p.name + ' — ' + (pkg === 'regular' ? 'Everyday Pouch' : 'Premium Jar');
    // A few premium source photos contain two jars baked into one image —
    // zoom/reposition onto a single clean jar instead of the default center crop.
    if (pkgData.imgZoom) {
      img.style.objectPosition = 'left center';
      img.style.transform = 'scale(1.35)';
      img.style.transformOrigin = 'left center';
    } else {
      img.style.objectPosition = 'center';
      img.style.transform = 'none';
    }
    img.style.opacity = '1';
  }, 150);

  // Visual bg
  var visual = document.getElementById('pdp-visual');
  visual.style.background = p.bgDark ? '#2A1F1A' : (p.bg || '#F0EAE0');

  // Package details row
  document.getElementById('pdp-details').innerHTML =
    '<div class="pdp-pkg-detail"><span class="pdp-pkg-detail-val">' + pkgData.weight + '</span><span class="pdp-pkg-detail-key">Net Weight</span></div>' +
    '<div class="pdp-pkg-detail"><span class="pdp-pkg-detail-val">' + pkgData.servings + '</span><span class="pdp-pkg-detail-key">Servings</span></div>' +
    '<div class="pdp-pkg-detail"><span class="pdp-pkg-detail-val">' + (pkg === 'regular' ? 'Pouch' : 'Glass Jar') + '</span><span class="pdp-pkg-detail-key">Pack Type</span></div>';

  // Price
  document.getElementById('pdp-price').textContent = '₹' + pkgData.price;
  document.getElementById('pdp-price-note').textContent = 'incl. of all taxes';

  // Art section
  var artSection = document.getElementById('pdp-art-section');
  if (pkg === 'premium' && pkgData.art) {
    artSection.classList.remove('pdp-art-hidden');
    document.getElementById('pdp-art-tag').textContent = pkgData.art;
    document.getElementById('pdp-art-desc').textContent = pkgData.artDesc;
  } else {
    artSection.classList.add('pdp-art-hidden');
  }
}

function init() {
  var id = new URLSearchParams(window.location.search).get('id') || 'himalayan-pink-salt';
  product = PRODUCTS[id];
  if (!product) {
    window.location.href = 'makhana.html#flavours';
    return;
  }

  // Static content
  document.getElementById('page-title').textContent = 'मaka — ' + product.name;
  document.getElementById('pdp-crumb-name').textContent = product.name;
  document.getElementById('pdp-name').textContent = product.name;
  document.getElementById('pdp-tagline').textContent = product.tagline;
  document.getElementById('pdp-about').textContent = product.about;

  // Limited note
  if (product.isLimited) {
    document.getElementById('pdp-limited-note').style.display = 'block';
  }

  // Qualities
  var qHtml = '';
  product.qualities.forEach(function(q) {
    qHtml += '<div class="pdp-quality-card">' +
      '<span class="pdp-quality-icon">' + q.icon + '</span>' +
      '<div class="pdp-quality-title">' + q.title + '</div>' +
      '<p class="pdp-quality-desc">' + q.desc + '</p>' +
      '</div>';
  });
  document.getElementById('pdp-qualities').innerHTML = qHtml;

  // Nutrition
  var n = product.nutrition;
  document.getElementById('pdp-nutrition').innerHTML =
    '<div class="mk-stat"><span class="mk-stat-num">' + n.calories + '</span><span class="mk-stat-label">CALORIES</span></div>' +
    '<div class="mk-stat"><span class="mk-stat-num">' + n.protein + '</span><span class="mk-stat-label">PROTEIN</span></div>' +
    '<div class="mk-stat"><span class="mk-stat-num">' + n.fat + '</span><span class="mk-stat-label">TOTAL FAT</span></div>' +
    '<div class="mk-stat"><span class="mk-stat-num">' + n.carbs + '</span><span class="mk-stat-label">CARBOHYDRATES</span></div>';

  document.getElementById('pdp-ingredients').innerHTML =
    '<strong>Ingredients</strong>' + product.ingredients;

  // Apply accent color to page
  document.documentElement.style.setProperty('--pdp-accent', product.accent);

  // Initial render
  render('regular');

  // Tab switching
  document.querySelectorAll('.pdp-pkg-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.pdp-pkg-tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      render(this.dataset.pkg);
    });
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
